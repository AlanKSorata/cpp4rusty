    <script>
      (() => {
        const tocLinks = Array.from(document.querySelectorAll('.toc a'));
        if (!tocLinks.length) return;

        const headingMap = new Map();
        for (const link of tocLinks) {
          const id = decodeURIComponent(link.getAttribute('href').slice(1));
          const heading = document.getElementById(id);
          if (heading) headingMap.set(heading, link);
        }

        let activeLink = null;

        function setActive(link) {
          if (activeLink === link) return;
          if (activeLink) activeLink.classList.remove('is-active');
          activeLink = link;
          if (activeLink) activeLink.classList.add('is-active');
        }

        const observer = new IntersectionObserver((entries) => {
          const visible = entries
            .filter(entry => entry.isIntersecting)
            .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);

          if (visible.length) {
            const first = visible[0].target;
            setActive(headingMap.get(first) || null);
          }
        }, {
          rootMargin: '-20% 0px -65% 0px',
          threshold: [0, 1]
        });

        for (const heading of headingMap.keys()) {
          observer.observe(heading);
        }

        function fallbackFromScroll() {
          let current = null;
          for (const [heading, link] of headingMap.entries()) {
            if (heading.getBoundingClientRect().top <= 140) {
              current = link;
            }
          }
          if (current) setActive(current);
        }

        window.addEventListener('scroll', fallbackFromScroll, { passive: true });
        fallbackFromScroll();
      })();
    </script>
